<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeLog — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #09090e;
  --bg1:     #0f0f18;
  --bg2:     #141420;
  --bg3:     #1c1c2a;
  --border:  rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.16);
  --purple:  #7c5cfc;
  --purple2: #a488ff;
  --green:   #26a69a;
  --red:     #ef5350;
  --text:    #f0f0f8;
  --text2:   #b0b0c8;
  --text3:   #8484a0;
  --mono:    'IBM Plex Mono', monospace;
  --ui:      'DM Sans', sans-serif;
  --display: 'Cormorant Garamond', serif;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: -30%; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse, rgba(124,92,252,0.12) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%; left: 20%;
  width: 500px; height: 400px;
  background: radial-gradient(ellipse, rgba(38,166,154,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.grid-overlay {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}
.login-card {
  position: relative; z-index: 10;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 44px 38px;
  width: 100%; max-width: 420px;
  box-shadow: 0 0 0 1px rgba(124,92,252,0.08), 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(124,92,252,0.06);
  text-align: center;
}
.logo-wrap { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:20px; }
.logo-wrap img { width:40px; height:40px; border-radius:9px; object-fit:contain; }
.logo-text { font-family:var(--display); font-size:30px; font-weight:400; font-style:italic; }
.logo-text span { color:var(--purple2); }
.tagline { font-family:var(--mono); font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--text3); margin-bottom:28px; }
.divider { height:1px; background:var(--border); margin-bottom:24px; }

/* ── TABS ── */
.auth-tabs { display:flex; background:var(--bg2); border-radius:10px; padding:3px; margin-bottom:22px; gap:3px; }
.auth-tab { flex:1; padding:8px; font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; border:none; background:none; color:var(--text3); cursor:pointer; border-radius:8px; transition:all .2s; }
.auth-tab.active { background:var(--bg3); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.3); }

/* ── PANELS ── */
.auth-panel { display:none; }
.auth-panel.active { display:block; }

/* ── INPUTS ── */
.field { margin-bottom:14px; text-align:left; }
.field label { display:block; font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
.field input {
  width:100%; padding:12px 14px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:9px; color:var(--text);
  font-family:var(--ui); font-size:14px;
  outline:none; transition:border-color .2s;
}
.field input:focus { border-color:var(--purple); }
.field input::placeholder { color:var(--text3); }

/* ── BUTTONS ── */
.btn-google {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:13px 24px;
  background:#fff; color:#1f1f1f;
  border:none; border-radius:10px;
  font-family:var(--ui); font-size:14px; font-weight:500;
  cursor:pointer; transition:all .2s;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  margin-bottom:0;
}
.btn-google:hover { background:#f5f5f5; transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,0.4); }
.btn-google:active { transform:translateY(0); }
.btn-google.loading { opacity:.7; cursor:not-allowed; pointer-events:none; }

.btn-primary {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:13px 24px;
  background:var(--purple); color:#fff;
  border:none; border-radius:10px;
  font-family:var(--ui); font-size:14px; font-weight:500;
  cursor:pointer; transition:all .2s;
  box-shadow:0 2px 12px rgba(124,92,252,0.3);
}
.btn-primary:hover { background:var(--purple2); transform:translateY(-1px); }
.btn-primary:active { transform:translateY(0); }
.btn-primary.loading { opacity:.7; cursor:not-allowed; pointer-events:none; }

.or-divider { display:flex; align-items:center; gap:12px; margin:18px 0; }
.or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.or-divider span { font-family:var(--mono); font-size:9px; letter-spacing:.1em; color:var(--text3); text-transform:uppercase; }

.forgot-link { font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); text-decoration:none; display:block; text-align:right; margin-top:-8px; margin-bottom:16px; transition:color .2s; }
.forgot-link:hover { color:var(--purple2); }

.toggle-auth { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:16px; }
.toggle-auth a { color:var(--purple2); text-decoration:none; cursor:pointer; }
.toggle-auth a:hover { text-decoration:underline; }

/* ── STATUS ── */
.status-msg { margin-top:14px; font-family:var(--mono); font-size:11px; min-height:18px; color:var(--text3); transition:color .2s; text-align:center; }
.status-msg.error   { color:var(--red); }
.status-msg.success { color:var(--green); }

/* ── SPINNER ── */
.spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
.btn-primary.loading .spinner { display:block; }
.g-spinner { width:16px; height:16px; border:2px solid rgba(0,0,0,0.15); border-top-color:var(--purple); border-radius:50%; animation:spin .7s linear infinite; display:none; }
.btn-google.loading .g-spinner { display:block; }
.btn-google.loading .google-icon { display:none; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── FOOTER ── */
.back-link { display:block; margin-top:22px; font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); text-decoration:none; transition:color .2s; }
.back-link:hover { color:var(--text2); }
.secure-note { margin-top:24px; padding-top:18px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:center; gap:6px; font-family:var(--mono); font-size:8px; letter-spacing:.1em; color:var(--text3); text-transform:uppercase; }
.secure-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px rgba(38,166,154,0.6); flex-shrink:0; }

@media (max-width:480px) {
  .login-card { padding:36px 24px 30px; margin:16px; }
}
</style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="login-card">
  <div class="logo-wrap">
    <img id="logo-img" src="" alt="EdgeLog" onerror="this.style.display='none'">
    <div class="logo-text">Edge<span>Log</span></div>
  </div>
  <div class="tagline">Logging Into Success</div>
  <div class="divider"></div>

  <!-- Tab switcher -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
    <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- ── SIGN IN PANEL ── -->
  <div class="auth-panel active" id="panel-signin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="si-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')emailSignIn()">
    </div>
    <a class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
    <button class="btn-primary" id="btn-signin" onclick="emailSignIn()">
      <div class="spinner"></div>
      Sign In
    </button>
    <div class="or-divider"><span>or</span></div>
    <button class="btn-google" id="btn-google-si" onclick="signInWithGoogle()">
      <svg class="google-icon" width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <div class="g-spinner"></div>
      Continue with Google
    </button>
    <div class="status-msg" id="si-status"></div>
  </div>

  <!-- ── SIGN UP PANEL ── -->
  <div class="auth-panel" id="panel-signup">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="su-name" placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="su-password" placeholder="Min 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')emailSignUp()">
    </div>
    <button class="btn-primary" id="btn-signup" onclick="emailSignUp()">
      <div class="spinner"></div>
      Create Account
    </button>
    <div class="or-divider"><span>or</span></div>
    <button class="btn-google" id="btn-google-su" onclick="signInWithGoogle()">
      <svg class="google-icon" width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <div class="g-spinner"></div>
      Sign up with Google
    </button>
    <div class="status-msg" id="su-status"></div>
  </div>

  <a href="index.html" class="back-link">← Back to home</a>
  <div class="secure-note">
    <div class="secure-dot"></div>
    Secured by Firebase Auth · No passwords stored locally
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithRedirect, getRedirectResult, GoogleAuthProvider,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  updateProfile, sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app      = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// Logo
const logoImg = document.getElementById('logo-img');
const stored = sessionStorage.getItem('el_logo');
if (stored) logoImg.src = stored; else logoImg.style.display = 'none';

// ── Tab switch ──
window.switchTab = function(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) =>
    b.classList.toggle('active', ['signin','signup'][i] === tab));
  document.querySelectorAll('.auth-panel').forEach(p =>
    p.classList.toggle('active', p.id === 'panel-' + tab));
  setStatus('', '');
};

// ── Already signed in → redirect ──
onAuthStateChanged(auth, async (user) => {
  if (user) { await recordUser(user); redirect(user.email); }
});

// ── Handle Google redirect result (works on all devices) ──
getRedirectResult(auth).then(async (result) => {
  if (result?.user) {
    const user = result.user;
    setStatus('success', `Welcome, ${user.displayName || user.email}! Redirecting…`);
    await recordUser(user);
    setTimeout(() => redirect(user.email), 800);
  }
}).catch(err => {
  if (err.code && err.code !== 'auth/null-user')
    setStatus('error', friendlyError(err.code));
});

// ── Google Sign-In (always redirect — works on ALL devices/browsers) ──
window.signInWithGoogle = async function() {
  setLoading('btn-google-si', true);
  setLoading('btn-google-su', true);
  setStatus('', '');
  try {
    await signInWithRedirect(auth, provider);
  } catch(err) {
    setLoading('btn-google-si', false);
    setLoading('btn-google-su', false);
    setStatus('error', friendlyError(err.code));
  }
};

// ── Email Sign-In ──
window.emailSignIn = async function() {
  const email    = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  if (!email || !password) { setStatus('error', 'Please fill in all fields.', 'si'); return; }
  setLoading('btn-signin', true);
  setStatus('', '', 'si');
  try {
    const result = await signInWithEmailAndPassword(auth, email, password);
    setStatus('success', 'Signed in! Redirecting…', 'si');
    await recordUser(result.user);
    setTimeout(() => redirect(result.user.email), 800);
  } catch(err) {
    setLoading('btn-signin', false);
    setStatus('error', friendlyError(err.code), 'si');
  }
};

// ── Email Sign-Up ──
window.emailSignUp = async function() {
  const name     = document.getElementById('su-name').value.trim();
  const email    = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;
  if (!name || !email || !password) { setStatus('error', 'Please fill in all fields.', 'su'); return; }
  if (password.length < 6) { setStatus('error', 'Password must be at least 6 characters.', 'su'); return; }
  setLoading('btn-signup', true);
  setStatus('', '', 'su');
  try {
    const result = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(result.user, { displayName: name });
    setStatus('success', 'Account created! Redirecting…', 'su');
    await recordUser({ ...result.user, displayName: name });
    setTimeout(() => redirect(result.user.email), 800);
  } catch(err) {
    setLoading('btn-signup', false);
    setStatus('error', friendlyError(err.code), 'su');
  }
};

// ── Forgot Password ──
window.forgotPassword = async function() {
  const email = document.getElementById('si-email').value.trim();
  if (!email) { setStatus('error', 'Enter your email above first.', 'si'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    setStatus('success', 'Reset email sent! Check your inbox.', 'si');
  } catch(err) {
    setStatus('error', friendlyError(err.code), 'si');
  }
};

// ── Record user to Firestore ──
async function recordUser(user) {
  try {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    const now  = serverTimestamp();
    const sessionData = {
      timestamp: now,
      userAgent: navigator.userAgent,
      platform:  navigator.platform,
      language:  navigator.language,
      screenW:   screen.width,
      screenH:   screen.height,
      timezone:  Intl.DateTimeFormat().resolvedOptions().timeZone,
      referrer:  document.referrer || 'direct',
    };
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: user.uid, email: user.email,
        displayName: user.displayName || user.email.split('@')[0],
        photoURL: user.photoURL || null,
        createdAt: now, lastLogin: now, loginCount: 1,
        status: 'active', isAdmin: user.email === ADMIN_EMAIL,
        lastSession: sessionData,
      });
    } else {
      const data = snap.data();
      await setDoc(ref, {
        ...data,
        displayName: user.displayName || data.displayName,
        photoURL: user.photoURL || data.photoURL || null,
        lastLogin: now, loginCount: (data.loginCount || 0) + 1,
        lastSession: sessionData,
      }, { merge: true });
    }
    // Log session
    await addDoc(collection(db, 'users', user.uid, 'loginHistory'), {
      ...sessionData, email: user.email,
      displayName: user.displayName || user.email.split('@')[0],
    });
    await addDoc(collection(db, 'loginEvents'), {
      uid: user.uid, email: user.email,
      displayName: user.displayName || user.email.split('@')[0],
      photoURL: user.photoURL || null,
      ...sessionData,
    });
  } catch(e) { console.warn('recordUser failed:', e.message); }
}

function redirect(email) {
  window.location.href = 'EdgeLog_v61.html';
}

// ── Helpers ──
function setLoading(id, on) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('loading', on);
}
function setStatus(type, msg, panel) {
  const id = panel ? panel + '-status' : 'si-status';
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}
function friendlyError(code) {
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password. Try again.',
    'auth/invalid-credential':   'Invalid email or password.',
    'auth/email-already-in-use': 'This email is already registered. Sign in instead.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/too-many-requests':    'Too many attempts. Please wait and try again.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/popup-closed-by-user': 'Sign-in was cancelled.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
