<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeLog — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #09090e;
  --bg1:    #0f0f18;
  --bg2:    #141420;
  --bg3:    #1c1c2a;
  --border: rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.15);
  --purple: #7c5cfc;
  --purple2:#a488ff;
  --green:  #26a69a;
  --red:    #ef5350;
  --text:   #f0f0f8;
  --text2:  #b0b0c8;
  --text3:  #8484a0;
  --mono:   'IBM Plex Mono', monospace;
  --ui:     'DM Sans', sans-serif;
  --display:'Cormorant Garamond', serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(124,92,252,0.12) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: 20%;
  width: 500px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(38,166,154,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.login-card {
  position: relative;
  z-index: 10;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 52px 48px 44px;
  width: 100%;
  max-width: 420px;
  box-shadow:
    0 0 0 1px rgba(124,92,252,0.08),
    0 40px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(124,92,252,0.06);
}

.logo-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}
.logo-wrap img {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  object-fit: contain;
}
.logo-text {
  font-family: var(--display);
  font-size: 32px;
  font-weight: 400;
  font-style: italic;
  color: var(--text);
}
.logo-text span { color: var(--purple2); }

.tagline {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 24px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 0 0 24px;
}

.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: rgba(0,0,0,0.2);
}

.auth-tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: var(--ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.auth-tab.active {
  background: var(--purple);
  color: #fff;
}

.auth-tab:hover:not(.active) {
  color: var(--text2);
}

.auth-section {
  display: none;
}

.auth-section.active {
  display: block;
}

.input-group {
  margin-bottom: 16px;
}

.input-group label {
  display: block;
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.input-group input {
  width: 100%;
  padding: 11px 14px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  transition: all 0.2s;
}

.input-group input:focus {
  outline: none;
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
}

.input-group input::placeholder {
  color: var(--text3);
}

.sign-in-label {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
  font-family: var(--ui);
}

.btn-google,
.btn-email {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 14px 24px;
  border: none;
  border-radius: 10px;
  font-family: var(--ui);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}

.btn-google {
  background: #fff;
  color: #1f1f1f;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

.btn-google:hover {
  background: #f5f5f5;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.btn-email {
  background: var(--purple);
  color: #fff;
  box-shadow: 0 2px 12px rgba(124,92,252,0.3);
}

.btn-email:hover {
  background: var(--purple2);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(124,92,252,0.4);
}

.btn-google:active,
.btn-email:active {
  transform: translateY(0);
}

.btn-google.loading,
.btn-email.loading {
  opacity: 0.7;
  cursor: not-allowed;
  pointer-events: none;
}

.btn-google svg,
.btn-email svg {
  flex-shrink: 0;
}

.status-msg {
  margin-top: 16px;
  font-family: var(--mono);
  font-size: 11px;
  min-height: 20px;
  color: var(--text3);
  transition: color 0.2s;
  text-align: center;
}

.status-msg.error { color: var(--red); }
.status-msg.success { color: var(--green); }

.back-link {
  display: block;
  margin-top: 20px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  text-decoration: none;
  transition: color 0.2s;
  text-align: center;
}
.back-link:hover { color: var(--text2); }

.secure-note {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
}
.secure-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px rgba(38,166,154,0.6);
  flex-shrink: 0;
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.btn-google.loading .spinner,
.btn-email.loading .spinner { display: block; }
.btn-google.loading .google-icon { display: none; }
.btn-email.loading .email-icon { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .login-card { padding: 40px 28px 36px; margin: 16px; }
}
</style>
</head>

<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

// Logo setup
const logoImg = document.getElementById('logo-img');
const storedLogo = sessionStorage.getItem('el_logo');
if (storedLogo) { logoImg.src = storedLogo; logoImg.style.display = 'block'; }

// Global auth state
let currentAuthMode = 'google';

window.switchAuthTab = function(mode) {
  currentAuthMode = mode;
  document.querySelectorAll('.auth-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === mode);
  });
  document.querySelectorAll('.auth-section').forEach(sec => {
    sec.classList.toggle('active', sec.id === mode + '-section');
  });
  document.getElementById('status-msg').textContent = '';
  document.getElementById('status-msg').className = 'status-msg';
};

// Monitor auth state for mobile redirect result
onAuthStateChanged(auth, async (user) => {
  if (user) {
    try {
      await recordUser(user);
      redirect(user.email);
    } catch (err) {
      console.error('Failed to record user:', err);
    }
  }
});

// Check for redirect result (mobile/Safari)
getRedirectResult(auth).then(async (result) => {
  if (result && result.user) {
    const user = result.user;
    const msg = document.getElementById('status-msg');
    msg.textContent = `Welcome, ${user.displayName || user.email}! Redirecting…`;
    msg.classList.add('success');
    try {
      await recordUser(user);
      setTimeout(() => redirect(user.email), 800);
    } catch (err) {
      console.error('Mobile redirect user record error:', err);
      setTimeout(() => redirect(user.email), 800);
    }
  }
}).catch((err) => {
  console.error('Redirect result error:', err);
});

window.signInWithGoogle = async function() {
  const btn = document.getElementById('btn-google');
  const msg = document.getElementById('status-msg');
  btn.classList.add('loading');
  msg.textContent = '';
  msg.className = 'status-msg';

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  if (isMobile || isSafari) {
    try {
      await signInWithRedirect(auth, provider);
    } catch (err) {
      btn.classList.remove('loading');
      msg.textContent = 'Sign-in failed. Please try again.';
      msg.classList.add('error');
      console.error('Redirect error:', err);
    }
  } else {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      msg.textContent = `Welcome, ${user.displayName}! Redirecting…`;
      msg.classList.add('success');
      await recordUser(user);
      setTimeout(() => redirect(user.email), 800);
    } catch (err) {
      btn.classList.remove('loading');
      if (err.code !== 'auth/popup-closed-by-user') {
        msg.textContent = 'Sign-in failed. Please try again.';
        msg.classList.add('error');
      }
      console.error('Popup error:', err);
    }
  }
};

window.handleEmailAuth = async function() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn = document.getElementById('btn-email');
  const msg = document.getElementById('status-msg');

  if (!email || !password) {
    msg.textContent = 'Please enter email and password';
    msg.classList.add('error');
    return;
  }

  btn.classList.add('loading');
  msg.textContent = '';
  msg.className = 'status-msg';

  try {
    let result;
    try {
      // Try sign in first
      result = await signInWithEmailAndPassword(auth, email, password);
      msg.textContent = `Welcome back! Redirecting…`;
      msg.classList.add('success');
    } catch (signInErr) {
      // If sign in fails, try creating account
      if (signInErr.code === 'auth/user-not-found' || signInErr.code === 'auth/invalid-credential') {
        result = await createUserWithEmailAndPassword(auth, email, password);
        msg.textContent = `Account created! Welcome to EdgeLog…`;
        msg.classList.add('success');
      } else {
        throw signInErr;
      }
    }

    const user = result.user;
    await recordUser(user);
    setTimeout(() => redirect(user.email), 800);
  } catch (err) {
    btn.classList.remove('loading');
    if (err.code === 'auth/weak-password') {
      msg.textContent = 'Password must be at least 6 characters';
    } else if (err.code === 'auth/email-already-in-use') {
      msg.textContent = 'Email already in use. Try signing in.';
    } else if (err.code === 'auth/invalid-email') {
      msg.textContent = 'Invalid email address';
    } else {
      msg.textContent = err.message || 'Authentication failed';
    }
    msg.classList.add('error');
    console.error('Email auth error:', err);
  }
};

async function recordUser(user) {
  const ref  = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  const now  = serverTimestamp();

  const sessionData = {
    timestamp:   now,
    userAgent:   navigator.userAgent,
    platform:    navigator.platform,
    language:    navigator.language,
    screenW:     screen.width,
    screenH:     screen.height,
    timezone:    Intl.DateTimeFormat().resolvedOptions().timeZone,
    referrer:    document.referrer || 'direct',
  };

  if (!snap.exists()) {
    await setDoc(ref, {
      uid:         user.uid,
      email:       user.email,
      displayName: user.displayName || user.email.split('@')[0],
      photoURL:    user.photoURL || '',
      createdAt:   now,
      lastLogin:   now,
      loginCount:  1,
      status:      'active',
      isAdmin:     user.email === ADMIN_EMAIL,
      lastSession: sessionData
    });
  } else {
    const data = snap.data();
    await setDoc(ref, {
      ...data,
      displayName: user.displayName || data.displayName,
      photoURL:    user.photoURL || data.photoURL,
      lastLogin:   now,
      loginCount:  (data.loginCount || 0) + 1,
      lastSession: sessionData,
      status:      'active'
    }, { merge: true });
  }

  const histRef = collection(db, 'users', user.uid, 'loginHistory');
  await addDoc(histRef, {
    ...sessionData,
    email:       user.email,
    displayName: user.displayName || user.email.split('@')[0],
  });

  const eventRef = collection(db, 'loginEvents');
  await addDoc(eventRef, {
    uid:         user.uid,
    email:       user.email,
    displayName: user.displayName || user.email.split('@')[0],
    photoURL:    user.photoURL || '',
    ...sessionData,
  });
}

function redirect(email) {
  if (email === ADMIN_EMAIL) {
    window.location.href = 'EdgeLog_v61.html';
  } else {
    window.location.href = 'EdgeLog_v61.html';
  }
}
</script>
